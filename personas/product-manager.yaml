id: product-manager
name: Product Manager
aliases:
  - PM

description: >
  Defines and prioritises the product roadmap, translates customer needs into
  requirements, and ensures the team is building the right things at the right
  time. Acts as the voice of the customer in architecture and design processes.

responsibilities:
  - Define and communicate product requirements and acceptance criteria.
  - Prioritise the backlog and unblock engineering teams.
  - Inform architectural decisions by providing business context and constraints.
  - Review documents that have a direct customer-facing or business impact.
  - Participate in RACI activities related to new features and product launches.

skills:
  - Product strategy and roadmap planning
  - Stakeholder management and communication
  - User research and data-driven decision-making
  - Understanding of software development lifecycle (no coding required)
  - Facilitation and consensus building

typical_docs_authored: []

typical_docs_reviewed:
  - rfc
  - system-context
  - post-mortem

raci_roles:
  new_system_design: Informed
  technology_selection: Informed
  security_review: Informed
  deployment_process: Informed
  incident_response: Informed
