id: technical-lead
name: Technical Lead
aliases:
  - Tech Lead
  - TL

description: >
  Senior engineer who provides technical direction for a squad or project.
  Bridges the gap between architecture strategy and day-to-day engineering.
  Accountable for the technical quality and delivery of the team's work.

responsibilities:
  - Translate architectural decisions into actionable engineering tasks.
  - Own the technical quality of the team's deliverables.
  - Review and approve Component Design documents and Runbooks.
  - Facilitate technical discussions and resolve engineering trade-offs within the team.
  - Drive adoption of ADRs, RFCs, and the AaC framework within the squad.
  - Represent the engineering team in cross-team architectural forums.

skills:
  - Deep expertise in the team's technology stack
  - Code review and design review
  - Mentoring and knowledge sharing
  - Project estimation and planning
  - Stakeholder communication

typical_docs_authored:
  - adr
  - component-design
  - runbook
  - rfc

typical_docs_reviewed:
  - adr
  - rfc
  - component-design
  - runbook
  - post-mortem

raci_roles:
  new_system_design: Responsible
  technology_selection: Responsible
  security_review: Consulted
  deployment_process: Accountable
  incident_response: Accountable
