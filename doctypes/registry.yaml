---
# Document-type registry
schema_version: "1.0.0"
description: >
  Registry of all document types recognised by the AAC framework.
  Each entry defines the type's identifier, display name, template,
  naming pattern, and required metadata fields.

doctypes:
  - id: platform-policy
    name: Platform Policy
    abbreviation: PLCY
    template: templates/platform-policy/template.md
    naming_pattern: "plcy-{NNNN}-{slug}.md"
    naming_example: "plcy-0001-network-segmentation-policy.md"
    labels:
      category: governance
      status: [draft, review, accepted, deprecated, superseded]
    required_metadata:
      - title
      - date
      - status
      - owner
      - scope
    description: >
      Defines a governing rule, constraint, or standard that applies across
      the platform. Policies are authoritative and must be complied with by
      all platform services and workloads within their stated scope.

  - id: composition-map
    name: Composition Map
    abbreviation: MAP
    template: templates/composition-map/template.md
    naming_pattern: "map-{slug}.md"
    naming_example: "map-data-ingestion-pipeline.md"
    labels:
      category: architecture
      status: [draft, review, approved, outdated]
    required_metadata:
      - title
      - date
      - owner
      - scope
    description: >
      Visualises and documents how platform services, capabilities, and
      workloads are composed together to deliver a business or technical
      capability. Acts as the landscape map for a solution or domain.

  - id: platform-service
    name: Platform Service
    abbreviation: PSVC
    template: templates/platform-service/template.md
    naming_pattern: "psvc-{slug}.md"
    naming_example: "psvc-secret-management.md"
    labels:
      category: design
      status: [draft, review, approved, deprecated]
    required_metadata:
      - service_name
      - owner
      - date
      - status
      - version
    description: >
      Specifies and documents a fully-managed shared service offered by the
      platform team. Defines the service contract, APIs, SLOs, onboarding
      guide, and operational responsibilities.

  - id: enterprise-service-design
    name: Enterprise Service Design
    abbreviation: ESVC
    template: templates/enterprise-service-design/template.md
    naming_pattern: "esvc-{slug}.md"
    naming_example: "esvc-public-cloud-identity-provider.md"
    labels:
      category: design
      status: [draft, review, approved, deprecated]
    required_metadata:
      - title
      - date
      - status
      - owner
      - dependency_owner
      - version
    description: >
      Specifies an enterprise service design that platform workloads depend on
      but do not own. Documents service boundaries, ownership model,
      integration contract, and operational expectations for external providers
      such as Public Cloud managed enterprise services.

  - id: pattern-overview
    name: Pattern Overview
    abbreviation: PO
    template: templates/pattern-overview/template.md
    naming_pattern: "po-{slug}.md"
    naming_example: "po-reference-integration-architecture.md"
    labels:
      category: architecture
      status: [draft, review, accepted, deprecated]
    required_metadata:
      - title
      - date
      - status
      - owner
      - scope
      - version
    description: >
      Provides a concise overview of a reusable architecture or delivery
      pattern, including intent, when to use it, constraints, and known
      trade-offs. Used to communicate pattern guidance to cross-functional
      teams before deeper design artifacts are produced.

  - id: engineering-specification
    name: Engineering Specification
    abbreviation: ENGS
    template: templates/engineering-specification/template.md
    naming_pattern: "tp-{cloud-scope}-engs-{####}-{slug}.md"
    naming_example: "tp-azr-engs-0001-identity-federation-golden-path.md"
    labels:
      category: design
      status: [draft, review, approved, deprecated]
    required_metadata:
      - title
      - date
      - status
      - owner
      - scope
      - version
      - audience
    description: >
      Engineering output document used by implementation teams to define
      golden path boundaries, interface contracts, sentinel guardrails,
      cloud resource selections, and label standards, with traceability
      back to architecture decisions.

  - id: composite-pattern
    name: Composite Pattern
    abbreviation: CMP
    template: templates/composite-pattern/template.md
    naming_pattern: "cmp-{NNNN}-{slug}.md"
    naming_example: "cmp-0001-event-driven-data-sync.md"
    labels:
      category: architecture
      status: [draft, review, accepted, deprecated]
    required_metadata:
      - title
      - date
      - author
      - status
    description: >
      Documents a reusable multi-service or multi-layer design pattern
      validated for use on the platform. Composite patterns combine platform
      services and capabilities into a proven, repeatable solution blueprint.

  - id: cross-cutting-concern
    name: Cross Cutting Concern
    abbreviation: XCUT
    template: templates/cross-cutting-concern/template.md
    naming_pattern: "xcut-{slug}.md"
    naming_example: "xcut-observability-standards.md"
    labels:
      category: governance
      status: [draft, review, accepted, deprecated]
    required_metadata:
      - title
      - date
      - owner
      - domains_affected
    description: >
      Documents a concern that cuts across all platform services and
      workloads — such as observability, security, resilience, compliance,
      or cost governance — and defines how it is addressed consistently.

  - id: operating-model-spec
    name: Operating Model Specification
    abbreviation: OMS
    template: templates/operating-model-spec/template.md
    naming_pattern: "oms-{slug}.md"
    naming_example: "oms-incident-management.md"
    labels:
      category: operations
      status: [draft, review, approved, deprecated]
    required_metadata:
      - title
      - date
      - owner
      - scope
      - version
    description: >
      Specifies how a platform service, capability, or domain is operated
      day-to-day. Covers responsibilities, escalation paths, runbook
      references, SLO targets, on-call arrangements, and change processes.
